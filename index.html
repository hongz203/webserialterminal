<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Serial Terminal</title>
  <style>
    /* ================================================================
       Theme variables — edit here to customize colors
       Dark theme is the default (:root).
       Light theme overrides are in :root[data-theme="light"].
    ================================================================ */
    :root {
      /* ── Visual Studio Dark ── */
      --bg-app:     #1e1e1e;   /* main background, log area */
      --bg-toolbar: #2d2d2d;   /* toolbar */
      --bg-panel:   #252525;   /* keyword bar, panel title */
      --bg-input:   #3c3c3c;   /* buttons, inputs */
      --bg-divider: #333333;   /* gap between panels */

      --text:       #d4d4d4;   /* primary text */
      --text-dim:   #888888;   /* secondary / muted text */
      --text-panel: #777777;   /* panel title text */

      --border:       #444444; /* general borders */
      --border-input: #5a5a5a; /* input/button borders */
      --border-focus: #777777; /* focused input outline */

      --btn-hover:  #505050;   /* button hover background */

      --connected-bg:     #4a1a1a; /* Disconnect button background */
      --connected-border: #c04040;
      --connected-text:   #ff8080;

      --log-hover:  rgba(255,255,255,0.04); /* log line hover tint */

      --scrollbar-thumb:       #484848;
      --scrollbar-thumb-hover: #5e5e5e;

      --accent: #8bc34a;  /* green — connected / success */
      --error:  #ff8888;  /* red — errors */
    }

    :root[data-theme="light"] {
      /* ── Visual Studio Light ── */
      --bg-app:     #ffffff;
      --bg-toolbar: #f3f3f3;
      --bg-panel:   #ececec;
      --bg-input:   #ffffff;
      --bg-divider: #e5e5e5;

      --text:       #383838;
      --text-dim:   #717171;
      --text-panel: #888888;

      --border:       #e5e5e5;
      --border-input: #cecece;
      --border-focus: #0090f1;

      --btn-hover:  #e8e8e8;

      --connected-bg:     #dff0d8;
      --connected-border: #388a34;
      --connected-text:   #388a34;

      --log-hover:  rgba(0,0,0,0.04);

      --scrollbar-thumb:       #c1c1c1;
      --scrollbar-thumb-hover: #a8a8a8;

      --accent: #007acc;
      --error:  #cd3131;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-app);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-size: 13px;
    }

    /* ── Toolbar ─────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #toolbar button,
    #toolbar select {
      padding: 4px 10px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border-input);
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }

    #toolbar button:hover:not(:disabled) { background: var(--btn-hover); }
    #toolbar button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Highlight "Disconnect" button while connected */
    #connect-btn.connected {
      background: var(--connected-bg);
      border-color: var(--connected-border);
      color: var(--connected-text);
    }

    #status {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Keyword bar ──────────────────────────────────────── */
    #keyword-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 5px 12px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 36px;
    }

    #keyword-input-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #keyword-input-group label {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #keyword-input {
      padding: 3px 8px;
      width: 160px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border-input);
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
    }
    #keyword-input:focus { outline: 1px solid var(--border-focus); }

    #keyword-color {
      width: 30px;
      height: 26px;
      border: 1px solid var(--border-input);
      border-radius: 3px;
      background: var(--bg-input);
      cursor: pointer;
      padding: 1px;
    }

    #add-keyword-btn {
      padding: 3px 10px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border-input);
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }
    #add-keyword-btn:hover { background: var(--btn-hover); }

    #keyword-tags {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
    }

    .kw-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 11px;
      border: 1px solid rgba(128,128,128,0.3);
      user-select: none;
    }
    /* Disabled: remove inline color overrides and apply theme-aware muted style */
    .kw-tag.off {
      opacity: 0.45;
      background-color: var(--bg-input) !important;
      color: var(--text-dim) !important;
    }

    .kw-tag .kw-text { cursor: pointer; }

    .kw-tag .kw-remove {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 0 0 2px;
      opacity: 0.7;
    }
    .kw-tag .kw-remove:hover { opacity: 1; }

    /* Checkbox labels */
    .check-label {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    .check-label input[type="checkbox"] {
      cursor: pointer;
      accent-color: var(--accent);
    }

    /* Match mode badges on keyword tags */
    .kw-badge {
      font-size: 9px;
      font-weight: bold;
      border: 1px solid currentColor;
      border-radius: 2px;
      padding: 0 2px;
      line-height: 1.5;
      opacity: 0.8;
    }

    /* ── Split view (main + filter) ─────────────────────────── */
    #content {
      display: flex;
      flex: 1;
      overflow: hidden;
      background: var(--bg-divider);
      gap: 2px;
    }

    .panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      background: var(--bg-app);
      min-width: 0;
    }

    .panel-title {
      padding: 4px 10px;
      background: var(--bg-panel);
      font-size: 11px;
      color: var(--text-panel);
      border-bottom: 1px solid var(--bg-divider);
      flex-shrink: 0;
    }

    .log-view {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 2px 6px;
      font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
    }

    .log-line {
      display: block;
      white-space: pre;
      font-size: 12px;
      line-height: 1.65;
      color: var(--text);
    }
    .log-line:hover { background: var(--log-hover); }

    .hl {
      border-radius: 2px;
      padding: 0 1px;
    }

    /* Scrollbar (Webkit: Chrome, Edge) */
    .log-view::-webkit-scrollbar       { width: 8px; height: 8px; }
    .log-view::-webkit-scrollbar-track { background: var(--bg-app); }
    .log-view::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
    .log-view::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

    /* ── Unsupported browser overlay ─────────────────── */
    #unsupported {
      position: fixed;
      inset: 0;
      background: var(--bg-app);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--error);
      font-size: 15px;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <!-- Shown when browser is unsupported (hidden initially) -->
  <div id="unsupported" style="display:none">
    <div style="font-size:40px">⚠️</div>
    <div><strong>Your browser does not support Web Serial API.</strong></div>
    <div style="color:#aaa; font-size:13px; margin-top:4px">
      Please use Chrome or Edge 89+.<br>
      (Firefox and Safari do not support Web Serial API)
    </div>
  </div>

  <!-- ── Toolbar ──────────────────────────────────────── -->
  <div id="toolbar">
    <button id="port-btn">Select Port</button>

    <select id="baud-select" title="Baud Rate">
      <option value="9600">9600</option>
      <option value="19200">19200</option>
      <option value="38400">38400</option>
      <option value="57600">57600</option>
      <option value="115200" selected>115200</option>
      <option value="230400">230400</option>
      <option value="460800">460800</option>
      <option value="921600">921600</option>
    </select>

    <button id="connect-btn" disabled>Connect</button>
    <button id="clear-btn">Clear</button>

    <!-- Divider -->
    <span style="color:var(--text-dim); margin: 0 2px">|</span>

    <!-- Demo mode: generate virtual logs for testing without hardware -->
    <button id="demo-btn">▶ Demo</button>
    <select id="demo-speed" title="Demo log speed">
      <option value="800">Slow</option>
      <option value="200" selected>Normal</option>
      <option value="50">Fast</option>
      <option value="10">Flood</option>
    </select>

    <!-- Divider -->
    <span style="color:var(--text-dim); margin: 0 2px">|</span>

    <!-- Theme selector: VS Dark (default) / VS Light -->
    <select id="theme-select" title="Color theme">
      <option value="dark">VS Dark</option>
      <option value="light">VS Light</option>
    </select>

    <span id="status">Select a port to get started</span>
  </div>

  <!-- ── Keyword bar ──────────────────────────────────────── -->
  <div id="keyword-bar">
    <div id="keyword-input-group">
      <label for="keyword-input">Keywords:</label>
      <input type="text" id="keyword-input" placeholder="Enter keyword..." maxlength="80" />
      <!--
        color input: shows native browser color picker
        value always returned as '#rrggbb' format
      -->
      <input type="color" id="keyword-color" value="#ffeb3b" title="Select highlight color" />
      <label class="check-label" title="Case-sensitive matching">
        <input type="checkbox" id="kw-match-case"> Match case
      </label>
      <label class="check-label" title="Match whole word only (word boundary)">
        <input type="checkbox" id="kw-whole-word"> Whole word
      </label>
      <button id="add-keyword-btn">Add</button>
    </div>
    <!-- Container where keyword tags are dynamically added -->
    <div id="keyword-tags"></div>
  </div>

  <!-- ── Split view ────────────────────────────────────────── -->
  <div id="content">
    <!-- Left: all received logs -->
    <div class="panel">
      <div class="panel-title">Main Log — All received lines (max 10,000)</div>
      <div class="log-view" id="main-log"></div>
    </div>

    <!-- Right: keyword-matched lines only -->
    <div class="panel">
      <div class="panel-title">Filtered Log — Keyword matched lines (max 5,000)</div>
      <div class="log-view" id="filtered-log"></div>
    </div>
  </div>


  <script>
    'use strict';

    // ================================================================
    //  Buffer size limits
    // ================================================================
    const MAX_MAIN   = 10_000;  // Max lines in main view
    const MAX_FILTER = 5_000;   // Max lines in filter view

    // ================================================================
    //  Global state
    // ================================================================
    let port            = null;   // Port object returned by Web Serial API
    let reader          = null;   // Reader for port.readable stream
    let readLoopPromise = null;   // Stored Promise to await readLoop() completion
    let isConnected     = false;  // Whether currently connected

    // Incoming byte stream arrives in arbitrary chunks, not aligned to line boundaries
    // e.g. "hel" | "lo\nwor" | "ld\n" → buffer until '\n' received
    let lineBuffer = '';

    // Keyword list: Array<{ text: string, color: string, enabled: boolean }>
    let keywords = [];

    // ── requestAnimationFrame-based batch rendering queue ───────────
    // When logs arrive rapidly, flush all pending lines to DOM once per frame
    // → reduces DOM operations and improves performance
    let pendingMain   = [];   // Main view pending lines: string[]
    let pendingFilter = [];   // Filter view pending lines: Array<{ line, kw }>
    let rafId         = null; // requestAnimationFrame ID (null = not scheduled)

    // ================================================================
    //  DOM references (cached to avoid repeated querySelector calls)
    // ================================================================
    const mainLogEl     = document.getElementById('main-log');
    const filteredLogEl = document.getElementById('filtered-log');
    const statusEl      = document.getElementById('status');
    const portBtn       = document.getElementById('port-btn');
    const connectBtn    = document.getElementById('connect-btn');
    const baudSelect    = document.getElementById('baud-select');
    const clearBtn      = document.getElementById('clear-btn');
    const kwInput       = document.getElementById('keyword-input');
    const kwColor       = document.getElementById('keyword-color');
    const addKwBtn      = document.getElementById('add-keyword-btn');
    const kwTagsEl      = document.getElementById('keyword-tags');

    // ================================================================
    //  Browser support check
    //  Web Serial API: Chrome/Edge 89+ only, not supported in Firefox/Safari
    // ================================================================
    if (!('serial' in navigator)) {
      document.getElementById('unsupported').style.display = 'flex';
      document.getElementById('toolbar').style.display     = 'none';
      document.getElementById('keyword-bar').style.display = 'none';
      document.getElementById('content').style.display     = 'none';
    }

    // ================================================================
    //  Port selection
    // ================================================================
    portBtn.addEventListener('click', async () => {
      try {
        // requestPort(): shows the browser's port selection dialog
        // Security policy: must be called from a user gesture (click)
        // Cannot auto-connect or remember previous port — user must select each time
        port = await navigator.serial.requestPort();
        setStatus('Port selected — click [Connect] to connect', '#8bc34a');
        connectBtn.disabled = false;
      } catch (err) {
        // NotFoundError: user cancelled the dialog → normal, ignore
        if (err.name !== 'NotFoundError') {
          setStatus('Port selection error: ' + err.message, '#f88');
        }
      }
    });

    // ================================================================
    //  Connect / Disconnect button
    // ================================================================
    connectBtn.addEventListener('click', () => {
      if (isConnected) disconnectSerial();
      else             connectSerial();
    });

    async function connectSerial() {
      try {
        const baudRate = parseInt(baudSelect.value, 10);

        // port.open(): opens selected port at specified baud rate
        await port.open({ baudRate });

        isConnected = true;
        connectBtn.textContent = 'Disconnect';
        connectBtn.classList.add('connected');
        portBtn.disabled    = true;
        baudSelect.disabled = true;
        setStatus(`Connected ● ${baudRate} baud`, '#8bc34a');

        // Call readLoop without await → runs in background asynchronously
        // Store the Promise so disconnectSerial can wait for it to finish
        readLoopPromise = readLoop();

      } catch (err) {
        setStatus('Connection failed: ' + err.message, '#f88');
      }
    }

    async function disconnectSerial() {
      // Clear flag first → prevents readLoop's catch from calling this function recursively
      isConnected = false;

      // reader.cancel(): interrupts the ongoing read()
      if (reader) {
        try { await reader.cancel(); } catch (_) { /* ignore */ }
      }

      // Wait for readLoop to fully finish
      // → port.close() is only safe after reader.releaseLock() in finally block
      if (readLoopPromise) {
        try { await readLoopPromise; } catch (_) { /* ignore */ }
        readLoopPromise = null;
      }

      try { await port.close(); } catch (_) { /* already closed or error — ignore */ }

      // Restore UI
      connectBtn.textContent = 'Connect';
      connectBtn.classList.remove('connected');
      portBtn.disabled    = false;
      baudSelect.disabled = false;
      setStatus('Disconnected', '#888');
    }

    // ================================================================
    //  Data read loop (async, runs continuously while connected)
    // ================================================================
    async function readLoop() {
      // TextDecoder: converts Uint8Array (byte array) → string
      // { stream: true }: correctly handles multi-byte characters split across chunk boundaries
      // { fatal: false }: replaces invalid bytes with '?' instead of throwing an error
      const decoder = new TextDecoder('utf-8', { fatal: false });

      // port.readable: ReadableStream of incoming serial data
      reader = port.readable.getReader();

      let unexpectedError = null;

      try {
        while (true) {
          // read(): async wait until next chunk arrives
          // value: Uint8Array (received bytes), done: whether stream has ended
          const { value, done } = await reader.read();
          if (done) break;

          // Decode with { stream: true } to correctly join multi-byte characters across chunk boundaries
          processChunk(decoder.decode(value, { stream: true }));
        }
      } catch (err) {
        if (isConnected) {
          // Unexpected disconnection, e.g. USB cable pulled
          unexpectedError = err;
          isConnected = false;
        }
        // If isConnected is false, we called cancel() ourselves — ignore
      } finally {
        // releaseLock() must be called before port.close() can succeed
        reader.releaseLock();
        reader = null;

        // After releaseLock, port.close() can be called safely
        if (unexpectedError) {
          setStatus('Connection lost: ' + unexpectedError.message, '#f88');
          try { await port.close(); } catch (_) {}
          port = null;
          connectBtn.textContent = 'Connect';
          connectBtn.classList.remove('connected');
          connectBtn.disabled = true;   // User must select port again
          portBtn.disabled    = false;
          baudSelect.disabled = false;
        }
      }
    }

    // ================================================================
    //  Incoming chunk → split into lines
    // ================================================================
    function processChunk(chunk) {
      // Append new chunk to incomplete line left over from previous chunk
      lineBuffer += chunk;

      // Line separators: \r\n (Windows), \n (Unix), \r (old Mac / some embedded devices)
      // Order matters: check \r\n first to avoid splitting it into \r and \n separately
      // micro:bit, Arduino and other embedded devices often use \r only
      const parts = lineBuffer.split(/\r\n|\r|\n/);

      // Last element of split result is an incomplete line with no line ending yet
      // → keep it in buffer until the next chunk arrives
      lineBuffer = parts.pop() ?? '';

      for (const line of parts) {
        processLine(line);
      }
    }

    function processLine(line) {
      // Add to main view queue
      pendingMain.push(line);

      // Check if any active keyword matches this line
      const kw = matchKeyword(line);
      if (kw) pendingFilter.push({ line, kw });

      // requestAnimationFrame: calls flushPending just before the next screen render
      // Even if many lines arrive in sequence, RAF is only scheduled once → all flushed in one frame
      if (!rafId) {
        rafId = requestAnimationFrame(flushPending);
      }
    }

    // ================================================================
    //  Batch DOM update (requestAnimationFrame callback)
    // ================================================================
    function flushPending() {
      rafId = null;

      if (pendingMain.length > 0) {
        flushToView(mainLogEl, pendingMain, MAX_MAIN, (line) => buildLineEl(line, null));
        pendingMain = [];
      }

      if (pendingFilter.length > 0) {
        flushToView(filteredLogEl, pendingFilter, MAX_FILTER, ({ line, kw }) => buildLineEl(line, kw));
        pendingFilter = [];
      }
    }

    /**
     * Flush pending lines to DOM in batch, removing oldest lines if over buffer limit
     * @param {HTMLElement} container   - log view DOM element
     * @param {Array}       items       - items to append
     * @param {number}      maxLines    - maximum line count
     * @param {Function}    buildEl     - function that converts an item to a DOM element
     */
    function flushToView(container, items, maxLines, buildEl) {
      // Check scroll position before appending
      // Checking after would give wrong result because scrollHeight already changed
      const shouldScroll = isAtBottom(container);

      // DocumentFragment: a virtual container outside the real DOM tree
      // Collect multiple nodes in fragment, then insert with one appendChild(fragment)
      // → triggers layout reflow only once → better performance
      const frag = document.createDocumentFragment();
      for (const item of items) {
        frag.appendChild(buildEl(item));
      }

      // Remove oldest lines that exceed maxLines after the new ones are added
      const excess = container.children.length + items.length - maxLines;
      if (excess > 0) {
        for (let i = 0; i < excess; i++) {
          if (container.firstChild) container.removeChild(container.firstChild);
        }
      }

      container.appendChild(frag);

      if (shouldScroll) {
        container.scrollTop = container.scrollHeight;
      }
    }

    // ================================================================
    //  Build a log line DOM element (with keyword highlight if applicable)
    // ================================================================
    function buildLineEl(line, kw) {
      const span = document.createElement('span');
      span.className = 'log-line';

      if (!kw) {
        // No keyword: use textContent
        // ※ Never use innerHTML += — it re-parses the whole content and has XSS risk
        //    textContent auto-escapes HTML special characters
        span.textContent = line;
      } else {
        // Line has a matching keyword: highlight only the matched parts
        appendHighlighted(span, line, kw);
      }

      return span;
    }

    /**
     * Find keyword matches in text and insert highlight spans
     * Built using DOM API directly → no innerHTML needed → XSS fully prevented
     */
    function appendHighlighted(parent, line, kw) {
      // Use findMatches to support matchCase / wholeWord options
      const matches = findMatches(line, kw);
      let pos = 0;

      for (const { start, end } of matches) {
        // Plain text before the match
        if (start > pos) {
          parent.appendChild(document.createTextNode(line.slice(pos, start)));
        }

        // Highlight span: background = keyword color, text = contrast color
        const hl = document.createElement('span');
        hl.className = 'hl';
        hl.style.backgroundColor = kw.color;
        hl.style.color = contrastColor(kw.color);
        hl.textContent = line.slice(start, end);
        parent.appendChild(hl);

        pos = end;
      }

      // Remaining text after the last match
      if (pos < line.length) {
        parent.appendChild(document.createTextNode(line.slice(pos)));
      }
    }

    // ================================================================
    //  Keyword matching: returns first matching active keyword, or null
    // ================================================================
    function matchKeyword(line) {
      for (const kw of keywords) {
        if (kw.enabled && lineMatchesKeyword(line, kw)) return kw;
      }
      return null;
    }

    // Core match logic: respects matchCase and wholeWord flags
    function lineMatchesKeyword(line, kw) {
      if (kw.wholeWord) {
        // \b = word boundary — matches only if keyword is a standalone word
        return buildRegex(kw).test(line);
      }
      const haystack = kw.matchCase ? line          : line.toLowerCase();
      const needle   = kw.matchCase ? kw.text       : kw.text.toLowerCase();
      return haystack.includes(needle);
    }

    // Build a RegExp for whole-word matching (with optional case flag)
    function buildRegex(kw) {
      // Escape regex special characters in the keyword text
      const escaped = kw.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const flags   = kw.matchCase ? 'g' : 'gi';
      return new RegExp(`\\b${escaped}\\b`, flags);
    }

    // Find all {start, end} match positions of kw in line
    function findMatches(line, kw) {
      const matches = [];
      if (kw.wholeWord) {
        const regex = buildRegex(kw); // has 'g' flag — must reset lastIndex each call
        let m;
        while ((m = regex.exec(line)) !== null) {
          matches.push({ start: m.index, end: m.index + m[0].length });
        }
      } else {
        const haystack = kw.matchCase ? line    : line.toLowerCase();
        const needle   = kw.matchCase ? kw.text : kw.text.toLowerCase();
        let pos = 0, idx;
        while ((idx = haystack.indexOf(needle, pos)) !== -1) {
          matches.push({ start: idx, end: idx + needle.length });
          pos = idx + needle.length;
        }
      }
      return matches;
    }

    // ================================================================
    //  Returns black or white text color for best contrast against the given background
    // ================================================================
    function contrastColor(hex) {
      // hex: '#rrggbb' format (color input always returns this format)
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      // YIQ brightness formula: weighted average reflecting human eye sensitivity
      // Green is perceived brightest, then red, then blue
      const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
      return brightness > 128 ? '#000000' : '#ffffff';
    }

    // ================================================================
    //  Check if scroll is at the bottom
    // ================================================================
    function isAtBottom(el) {
      // scrollHeight  : total scrollable content height
      // scrollTop     : pixels scrolled from the top
      // clientHeight  : visible area height
      // Allow 5px tolerance for sub-pixel calculation differences
      return el.scrollHeight - el.scrollTop - el.clientHeight < 5;
    }

    // ================================================================
    //  Display status message
    // ================================================================
    function setStatus(msg, color = '#888') {
      statusEl.textContent = msg;
      statusEl.style.color = color;
    }

    // ================================================================
    //  Clear button: reset log views and all buffers
    // ================================================================
    clearBtn.addEventListener('click', () => {
      mainLogEl.innerHTML     = '';
      filteredLogEl.innerHTML = '';
      lineBuffer    = '';
      pendingMain   = [];
      pendingFilter = [];
    });

    // ================================================================
    //  Add keyword
    // ================================================================
    addKwBtn.addEventListener('click', addKeyword);

    // Also add keyword with Enter key
    kwInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addKeyword();
    });

    function addKeyword() {
      const text = kwInput.value.trim();
      if (!text) return;

      // Prevent duplicates (case-insensitive)
      if (keywords.some(k => k.text.toLowerCase() === text.toLowerCase())) {
        kwInput.select();
        return;
      }

      keywords.push({
        text,
        color:     kwColor.value,
        enabled:   true,
        matchCase: document.getElementById('kw-match-case').checked,
        wholeWord: document.getElementById('kw-whole-word').checked,
      });
      kwInput.value = '';
      renderKwTags();
    }

    function removeKeyword(i) {
      keywords.splice(i, 1);
      renderKwTags();
    }

    function toggleKeyword(i) {
      keywords[i].enabled = !keywords[i].enabled;
      renderKwTags();
    }

    // ================================================================
    //  Render keyword tag list
    // ================================================================
    function renderKwTags() {
      // Build all tags in a DocumentFragment, then insert in one operation (performance)
      const frag = document.createDocumentFragment();

      keywords.forEach((kw, i) => {
        const tag = document.createElement('span');
        tag.className = 'kw-tag' + (kw.enabled ? '' : ' off');
        // When enabled: use the keyword's own color (inline style)
        // When disabled: clear inline styles so CSS .kw-tag.off (theme variables) takes over
        tag.style.backgroundColor = kw.enabled ? kw.color : '';
        tag.style.color = kw.enabled ? contrastColor(kw.color) : '';

        // Text click → toggle on/off
        const txt = document.createElement('span');
        txt.className = 'kw-text';
        txt.textContent = kw.text;
        txt.title = kw.enabled ? 'Click to disable' : 'Click to enable';
        txt.addEventListener('click', () => toggleKeyword(i));
        tag.appendChild(txt);

        // Show "Aa" badge if case-sensitive, "W" badge if whole-word
        if (kw.matchCase) {
          const b = document.createElement('span');
          b.className = 'kw-badge';
          b.textContent = 'Aa';
          b.title = 'Case sensitive';
          tag.appendChild(b);
        }
        if (kw.wholeWord) {
          const b = document.createElement('span');
          b.className = 'kw-badge';
          b.textContent = 'W';
          b.title = 'Whole word';
          tag.appendChild(b);
        }

        // × button → remove
        const del = document.createElement('button');
        del.className = 'kw-remove';
        del.textContent = '×';
        del.title = 'Remove keyword';
        del.addEventListener('click', (e) => {
          e.stopPropagation(); // prevent event from bubbling up to parent tag
          removeKeyword(i);
        });

        tag.appendChild(del);
        frag.appendChild(tag);
      });

      kwTagsEl.innerHTML = ''; // clear existing tags
      kwTagsEl.appendChild(frag);
    }

    // ================================================================
    //  Demo mode: inject virtual logs for testing without hardware

    const demoBtn   = document.getElementById('demo-btn');
    const demoSpeed = document.getElementById('demo-speed');

    let demoTimer   = null;  // setInterval ID
    let demoLineIdx = 0;     // current playback position

    demoBtn.addEventListener('click', () => {
      if (demoTimer) {
        // Running → stop
        clearInterval(demoTimer);
        demoTimer = null;
        demoBtn.textContent = '▶ Demo';
        demoBtn.style.borderColor = '';
        demoBtn.style.color = '';
        setStatus('Demo stopped', '#888');
      } else {
        // Stopped → start
        demoLineIdx = 0;
        demoBtn.textContent = '■ Stop';
        demoBtn.style.borderColor = '#8bc34a';
        demoBtn.style.color = '#8bc34a';
        setStatus('Demo running — no real port connected', '#8bc34a');

        const interval = parseInt(demoSpeed.value, 10);

        demoTimer = setInterval(() => {
          if (demoLineIdx >= DEMO_LINES.length) {
            // Reached end → loop from beginning
            demoLineIdx = 0;
          }
          // Inject directly via processLine() as if received from real serial
          processLine(DEMO_LINES[demoLineIdx++]);
        }, interval);
      }
    });

    // ================================================================
    //  Theme switching
    //  Applies 'data-theme' attribute to <html> element.
    //  CSS variables in :root[data-theme="light"] override the dark defaults.
    //  Selection is saved to localStorage so it persists across page reloads.
    // ================================================================
    const themeSelect = document.getElementById('theme-select');

    function applyTheme(name) {
      // Setting attribute on documentElement (<html>) so CSS selector :root[data-theme] works
      document.documentElement.setAttribute('data-theme', name);
    }

    // Restore saved theme, or fall back to dark
    const savedTheme = localStorage.getItem('wst-theme') || 'dark';
    applyTheme(savedTheme);
    themeSelect.value = savedTheme;

    themeSelect.addEventListener('change', () => {
      applyTheme(themeSelect.value);
      localStorage.setItem('wst-theme', themeSelect.value);
    });

    // ================================================================
    //  Initial state
    // ================================================================
    setStatus('Select a port to get started');

  </script>
